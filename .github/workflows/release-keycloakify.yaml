name: Release Keycloakify theme

on:
  push:
    branches:
      - main
    paths:
      - 'ol-keycloakify/**'
      - '.github/workflows/release-keycloakify.yaml'

defaults:
  run:
    working-directory: ol-keycloakify

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: "^24.0.0"
          cache: yarn
          cache-dependency-path: ol-keycloakify/yarn.lock

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install
        run: yarn install --immutable

      - name: Sync Keycloakify extensions
        run: yarn keycloakify sync-extensions

      - name: Build Keycloak theme
        run: yarn build-keycloak-theme

  check_if_version_upgraded:
    name: Check if version upgrade
    runs-on: ubuntu-latest
    needs: test
    outputs:
      from_version: ${{ steps.step1.outputs.from_version }}
      to_version: ${{ steps.step1.outputs.to_version }}
      is_upgraded_version: ${{ steps.step1.outputs.is_upgraded_version }}
      is_pre_release: ${{ steps.step1.outputs.is_pre_release }}
    steps:
      - uses: garronej/ts-ci@4d038d61d0a9a3fbf426234bce58fd83362614a0 # v2.1.5
        id: step1
        with:
          action_name: is_package_json_version_upgraded
          branch: ${{ github.head_ref || github.ref }}
          package_json_file_path: ol-keycloakify/package.json

  create_github_release:
    runs-on: ubuntu-latest
    needs: check_if_version_upgraded
    if: needs.check_if_version_upgraded.outputs.is_upgraded_version == 'true'
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: "^24.0.0"
          cache: yarn
          cache-dependency-path: ol-keycloakify/yarn.lock

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install
        run: yarn install --immutable

      - name: Sync Keycloakify extensions
        run: yarn keycloakify sync-extensions

      - name: Build Keycloak theme
        run: yarn build-keycloak-theme

      - uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          name: Keycloakify theme v${{ needs.check_if_version_upgraded.outputs.to_version }}
          tag_name: keycloakify-v${{ needs.check_if_version_upgraded.outputs.to_version }}
          target_commitish: ${{ github.head_ref || github.ref }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ needs.check_if_version_upgraded.outputs.is_pre_release == 'true' }}
          files: ol-keycloakify/dist_keycloak/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
